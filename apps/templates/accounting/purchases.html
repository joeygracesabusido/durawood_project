{% extends 'dashboard.html' %}

{% block content %}

    <div class="pagetitle">
      <h1>Purchases Transaction</h1>
	
   <div class="container mt-3">
                    {% for messege in messeges %}
                    <div class="alert alert-danger" role="alert">
                    {{ messege }}
                    </div>
                    {% endfor %}
   </div>
    </div><!-- End Page Title -->

    <section class="section">
      <div class="row">
        <div class="col-lg-10 mx-auto">
          <div class="card">
            <div class="card-body">
              <h5 class="card-title">Purchase Entry</h5>

              <!-- General Form Elements -->
              <form method="POST">
                <input type="text" id="id" name="branch_id" class="form-control form-control-sm" hidden required>

                <div class="form-group mb-3">
                  <label for="branch_name" class="form-label-small">Branch</label>
                  <input type="text" id="branch_name" name="branch_name" class="form-control form-control-sm" required>
                </div>

                <div class="form-group mb-3">
                  <label for="supplier" class="form-label-small">Supplier</label>
                  <input type="text" id="supplier" name="supplier" class="form-control form-control-sm" required>
                </div>

                <input type="text" id="supplier_id" name="supplier_id" class="form-control form-control-sm" hidden  required>

                <div class="form-group mb-3">
                  <label for="trans_date" class="form-label-small">Date</label>
                  <input type="date" id="trans_date" name="trans_date" class="form-control form-control-sm">
                </div>

                <div class="form-group mb-3">
                  <label for="journal_type" class="form-label-small">Journal</label>
                     <select name="journal_type" id="journal_type" class="form-select form-select-sm">
                      <option value="Purchases">Purchases</option>
                     </select>
                </div>

                <div class="form-group mb-3">
                  <label for="reference" class="form-label-small">Reference</label>
                  <input type="text" id="reference" name="reference" class="form-control form-control-sm">
                </div>

                <div class="form-group mb-3">
                  <label for="description" class="form-label-small">Description</label>
                  <textarea class="form-control form-control-sm" id="description" name="description" style="height: 100px"></textarea>
                </div>

                <div class="form-group mb-3">
                  <label for="invoice_amount" class="form-label-small">Amount</label>
                  <input type="text"  class="form-control form-control-sm" id="invoice_amount" name="invoice_amount">
                </div>

                <div class="table-responsive mt-4">
			      <table class="table table-borderless table-sm">
                        <thead class="border-bottom font-weight-bold">
                            <tr>
                                <td>Account Code</td>
                                <td>AccounTitle</td>
                                <td>Witholding Tax %</td>
                                <td>Debit</td>
                                <td>Credit</td>
                                <td>Action</td>
                            </tr>
                        </thead>
                        <tbody id="addrow"></tbody>
                    </table>
                </div>
               
                <div class="text-center pt-3 border-t">
					<button type="button"  id="add_button" class="btn btn-primary btn-sm"><i class="fas fa-plus me-1"></i>Add line</button>
                    <button type="submit" name='submit' id='submiBTN' class="btn btn-success btn-sm"><i class="fas fa-save me-1"></i>Save</button>
				</div>
              </form><!-- End General Form Elements -->

            </div>
          </div>
        </div>
      </div>
    </section>

	<script src="/static/accounting/purchases.js"></script>

{% endblock %}
