{% extends 'dashboard.html' %} {% block content %}

  <div class="pagetitle">
    <h1>Branch</h1>
  </div>
  <!-- End Page Title -->

  <section class="section">
    <div class="row">
      <div class="col-lg-6">
        <div class="card">
          <div class="card-body">
            <h5 class="card-title">Branch Form</h5>

            <!-- General Form Elements -->
            <form>
              <input type="text" id="id" class="form-control form-control-sm" hidden />

              <div class="form-group mb-3">
                <label for="branchName" class="form-label-small">Branch Name</label>
                <input type="text" id="branchName" class="form-control form-control-sm" />
              </div>

              <div class="form-group mb-3">
                <label for="branchAddress" class="form-label-small">Address</label>
                <textarea
                    class="form-control form-control-sm"
                    id="branchAddress"
                    style="height: 100px"
                  ></textarea>
              </div>

              <div class="text-center pt-3 border-t">
                <button
                  type="button"
                  id="btn_save_branch"
                  class="btn btn-primary btn-sm"
                >
                  Add
                </button>
                <button
                  type="button"
                  id="btn_update_branch"
                  class="btn btn-danger btn-sm"
                  style="display: none;"
                >
                  Cancel
                </button>
              </div>
            </form>
            <!-- End General Form Elements -->
          </div>
        </div>
      </div>
      <div class="col-lg-6">
        <div class="card">
          <div class="card-body">
            <h5 class="card-title">Branch List</h5>

            <!-- General Form Elements -->
            <table
              id="table_branch"
              class="table table-bordered table-sm"
              style="text-align: center"
            >
              <thead class="table-dark">
                <tr>
                  <td>#</td>
                  <td>Branch Name</td>
                  <td>Branch Address</td>
                </tr>
              </thead>
              <tbody id="table_branch_list"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script src="/static/accounting/branch.js"></script>

{% endblock %}
