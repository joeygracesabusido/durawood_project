{% extends 'dashboard.html' %}

{% block content %}

  <div class="pagetitle">
    <h1>Chart of Account</h1>
  </div><!-- End Page Title -->

 <!-- Account Type Modal -->
 <div class="modal fade" id="insert_account_type" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Account Type</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
            <div class="form-group mb-3">
                <label for="account_type_ins" class="form-label-small">Account Type</label>
                <input
                    type="text"
                    name="account_type_ins"
                    id="account_type_ins"
                    class="form-control form-control-sm"
                />
            </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Close</button>
          <button type="button" class="btn btn-primary btn-sm" id="btn_save_type_of_account">Save changes</button>
        </div>
      </div>
    </div>
  </div>

    <!-- Chart of Account Modal -->
    <div class="modal fade" id="insert_chart_of_account" tabindex="-1">
        <div class="modal-dialog modal-lg">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title">Chart of Account</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="form-group mb-3">
                    <label for="chart_of_account_code" class="form-label-small">Account Code</label>
                    <input
                        type="text"
                        name="chart_of_account_code"
                        id="chart_of_account_code"
                        class="form-control form-control-sm"
                    />
                </div>

                <div class="form-group mb-3">
                    <label for="chart_of_account" class="form-label-small">Account Title</label>
                    <input
                        type="text"
                        name="chart_of_account"
                        id="chart_of_account"
                        class="form-control form-control-sm"
                    />
                </div>

                <div class="form-group mb-3">
                    <label for="accoun_type" class="form-label-small">Account Type</label>
                    <input
                        type="text"
                        name="accoun_type"
                        id="accoun_type"
                        class="form-control form-control-sm"
                    />
                </div>

                <div class="form-group mb-3">
                    <label for="account_type_id" class="form-label-small">Account Type ID</label>
                    <input
                        type="number"
                        name="account_type_id"
                        id="account_type_id"
                        class="form-control form-control-sm" 
                    />
                </div>

                <div class="form-group mb-3">
                    <label for="description" class="form-label-small">Description</label>
                    <textarea
                        name="description" 
                        id="description"
                        class="form-control form-control-sm"
                    ></textarea>
                </div>
              
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Close</button>
              <button type="button" class="btn btn-primary btn-sm" id="btn_save_chart_of_account">Save changes</button>
            </div>
          </div>
        </div>
      </div>
  

      <!-- File Upload Modal -->
      <div class="modal fade" id="import_chart_of_account_modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Import Chart of Account</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="upload_chart_of_account_form">
                        <div class="form-group mb-3">
                            <label for="file_upload" class="form-label-small">Choose a File:</label>
                            <input type="file" id="file_upload" accept=".csv,.xlsx" class="form-control form-control-sm">
                        </div>
                        <div id="parsed_data" class="mt-3"></div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary btn-sm" id="btn_upload_file">Upload</button>
                </div>
            </div>
        </div>
    </div>
        
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="card-title mb-0">Chart of Account List</h5>
            <div>
                <button type="button" class="btn btn-primary btn-sm"  id="insert_account_type_btn"
                    data-bs-toggle="modal" data-bs-target="#insert_account_type" >
                    Add Account Type 
                </button>
                <button type="button" class="btn btn-primary btn-sm"  id="btn_chart_of_account"
                      data-bs-toggle="modal" data-bs-target="#insert_chart_of_account">
                    Insert Chart of Account
                </button>
                <button type="button" class="btn btn-primary btn-sm" 
                    data-bs-toggle="modal" data-bs-target="#import_chart_of_account_modal">
                    Import Chart of Account
                </button>
            </div>
        </div>
        <div class="card-body">
            <div class="table-responsive mt-3">
                <table id="table_chart_of_account" class="table table-bordered table-sm text-center">
                    <thead class="table-dark">
                        <tr>
                            <td>Account Code</td>
                            <td>BS Type</td>
                            <td>Account Title</td>
                            <td>ID</td>
                        </tr>
                    </thead>
                    <tbody id="table_chart_of_account_list"></tbody>
                </table>
            </div>
        </div>
    </div>
      
    <script src="/static/accounting/chart_of_account.js"></script>

{% endblock %}
