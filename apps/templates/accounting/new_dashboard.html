{% extends 'dashboard.html' %}

{% block content %}

<div class="pagetitle text-center">
  <h1>Dashboard</h1>
</div>

<section class="section dashboard">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="card-title">Top Customer Balance</h5>
                        <button id="btn_display_top_customer" class="btn btn-primary">
                            <i class="bi bi-trophy"></i> Display
                        </button>
                    </div>                    
                    <div class="table-responsive">
                        <table class="table table-hover table-sm" id="table_top_customer_balance">
                            <thead class="table-dark">
                                <tr>
                                    <th class="text-center">Rank</th>
                                    <th>Customer</th>
                                    <th class="text-end">Balance</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td colspan="3" class="text-center py-4 text-muted">Click "Display" to load data</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    function formatNumber(value) {
        if (isNaN(value) || value === null || value === undefined) {
            return '₱0.00';
        }
        return '₱' + parseFloat(value || 0).toLocaleString('en-US', { 
            minimumFractionDigits: 2, 
            maximumFractionDigits: 2 
        });
    }

    function fetchTopCustomerBalance() {
        // Show loading state
        document.querySelector('#table_top_customer_balance tbody').innerHTML = '<tr><td colspan="3" class="text-center py-4 text-muted"><div class="spinner-border spinner-border-sm" role="status"></div> Loading...</td></tr>';
        
        var xhr = new XMLHttpRequest();
        xhr.open('GET', '/api-get-top-customer-balance?limit=10', true);
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4) {
                if (xhr.status === 200) {
                    var data = JSON.parse(xhr.responseText);
                    var rows = '';
                    if (data.length > 0) {
                        data.forEach(function(item, index) {
                            rows += '<tr>';
                            rows += '<td class="text-center">' + (index + 1) + '</td>';
                            rows += '<td>' + item.customer + '</td>';
                            rows += '<td class="text-end">' + formatNumber(item.total_balance) + '</td>';
                            rows += '</tr>';
                        });
                    } else {
                        rows = '<tr><td colspan="3" class="text-center py-4">No data available</td></tr>';
                    }
                    document.querySelector('#table_top_customer_balance tbody').innerHTML = rows;
                } else {
                    var errorMsg = '<tr><td colspan="3" class="text-center py-4 text-danger">Error: ' + xhr.status + '</td></tr>';
                    document.querySelector('#table_top_customer_balance tbody').innerHTML = errorMsg;
                }
            }
        };
        xhr.send();
    }

    var btn = document.getElementById('btn_display_top_customer');
    if (btn) {
        btn.addEventListener('click', function(e) {
            e.preventDefault();
            fetchTopCustomerBalance();
        });
    }
});
</script>

{% endblock %}
