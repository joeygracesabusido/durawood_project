{% extends 'dashboard.html' %}

{% block css %}
<link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
<style>
.autocomplete-wrapper {
    position: relative;
    display: block;
}
/* Ensure the card and body don't clip the dropdown */
.card, .card-body {
    overflow: visible !important;
}
.ui-autocomplete {
    z-index: 100000 !important;
    background-color: #fff !important;
    border: 1px solid #d1d1d1 !important;
    max-height: 300px;
    overflow-y: auto;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2) !important;
    position: absolute !important;
    width: 100% !important;
}
.ui-menu-item {
    padding: 10px 15px;
    border-bottom: 1px solid #eee;
    cursor: pointer;
    list-style: none;
    font-size: 13px;
    color: #333;
}
.ui-menu-item:last-child {
    border-bottom: none;
}
.ui-menu-item:hover, .ui-state-active {
    background-color: #e9ecef !important;
    color: #000 !important;
    border: none !important;
    margin: 0 !important;
}
.ui-helper-hidden-accessible {
    display: none !important;
}
</style>
{% endblock %}

{% block content %}
  <div class="pagetitle">
    <h1>Payment Transaction</h1>
  </div>
  
  <section class="section">
    <div class="row">
      <div class="col-lg-5">
        <div class="card">
          <div class="card-body">
            <h5 class="card-title">Payment Form</h5>
            <form id="myForm">
              <div class="form-group mb-3">
                <label for="trans_date" class="form-label-small">Date</label>
                <input id="trans_date" type="date" class="form-control form-control-sm" value=""/>
              </div>

              <div class="form-group mb-3 autocomplete-wrapper">
                <label for="customer" class="form-label-small">Customer</label>
                <input id="customer" type="text" class="form-control form-control-sm" value=""/>
              </div>

              <div class="form-group mb-3">
                <label for="customer_id" class="form-label-small">Customer ID</label>
                <input id="customer_id" type="text" class="form-control form-control-sm" value=""/>
              </div>

              <div class="form-group mb-3">
                <label for="balance" class="form-label-small">Balance</label>
                <input id="balance" type="text" class="form-control form-control-sm" value=""/>
              </div>

              <div class="form-group mb-3">
                <label for="invoice_no" class="form-label-small">Invocie No.</label>
                <input id="invoice_no" type="text" class="form-control form-control-sm" value=""/>
              </div>

              <div class="form-group mb-3">
                  <label for="payment_method" class="form-label-small">Payment Method</label>
                    <select
                        id="payment_method"
                        class="form-select form-select-sm"
                        >
                        <option value="Cash">Cash</option>
                        <option value="Check">Check</option>
                        <option value="BANKREM">BANKREM</option>
                    </select>
                </div>

              <div class="form-group mb-3">
                <label for="collection_receipt" class="form-label-small">Collection Receipt</label>
                <input id="collection_receipt" type="text" class="form-control form-control-sm" value=""/>
              </div>

              <div class="form-group mb-3">
                <label for="cash_amount" class="form-label-small">Payment Received</label>
                <input id="cash_amount" type="number" class="form-control form-control-sm" value=""/>
              </div>

               <div class="form-group mb-3">
                <label for="amount_2307" class="form-label-small">2307 Amount</label>
                <input id="amount_2307" type="number" class="form-control form-control-sm" value=""/>
              </div>

               <div class="form-group mb-3">
                <label for="remarks" class="form-label-small">Remarks</label>
                <input id="remarks" type="text" class="form-control form-control-sm" value=""/>
              </div>

              <div class="text-center pt-3 border-t">
                <button id="btn_save_payment" type="button" class="btn btn-primary btn-sm">Add</button>
              </div>
            </form>
          </div>
        </div>
      </div>

    
     <div class="col-lg-4">
        <div class="card">
          <div class="card-body">
            <h5 class="text-warning fw-bold">SUMMARY:</h5>
            <h6 id="summary-balance" style="font-size:20px;"></h6>
          </div>
      </div>
    </div>
  </section>
  
  <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
  <script src="/static/accounting/payment.js"></script>


{% endblock %}
