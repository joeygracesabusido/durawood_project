{% extends 'dashboard.html' %} 
{% block content %}

<!-- jQuery (Make sure it's loaded before jQuery UI) -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://unpkg.com/@tailwindcss/browser@4"></script>

<!-- jQuery UI CSS (for styling the autocomplete dropdown) -->
<link rel="stylesheet" href="https://code.jquery.com/ui/1.12.1/themes/smoothness/jquery-ui.css">

<!-- jQuery UI JavaScript -->
<script src="https://code.jquery.com/ui/1.12.1/jquery-ui.min.js"></script>

<link href="https://cdn.datatables.net/v/dt/jszip-3.10.1/dt-2.1.4/b-3.1.1/b-html5-3.1.1/datatables.min.css" rel="stylesheet">
<script src="https://cdn.datatables.net/v/dt/jszip-3.10.1/dt-2.1.4/b-3.1.1/b-html5-3.1.1/datatables.min.js"></script>

<div class="pagetitle">
    <h1>Roles and Permissions</h1>
</div>

<section class="section">
    <div class="row">
        <div class="col-lg-4">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Add Role</h5>
                    <form id="myForm">
                        <div class="form-group mb-4">
                            <label for="role" class="form-label-small">Role Name</label>
                            <input id="role" type="text" class="form-control form-control-sm" placeholder="e.g. Sales Clerk">
                        </div>

                        <div class="section-title text-muted mb-3" style="font-size: 11px; font-weight: 700; text-transform: uppercase;">Permissions</div>

                        <div class="space-y-2 mb-4">
                            <div class="flex items-center">
                                <input id="user_update" type="checkbox" class="form-checkbox h-4 w-4 text-blue-600 rounded">
                                <label for="user_update" class="text-gray-700 ml-3 text-sm">User Update</label>
                            </div>

                            <div class="flex items-center">
                                <input id="sales" type="checkbox" class="form-checkbox h-4 w-4 text-blue-600 rounded">
                                <label for="sales" class="text-gray-700 ml-3 text-sm">Sales</label>
                            </div>

                            <div class="flex items-center">
                                <input id="sales_update" type="checkbox" class="form-checkbox h-4 w-4 text-blue-600 rounded">
                                <label for="sales_update" class="text-gray-700 ml-3 text-sm">Sales Update</label>
                            </div>

                            <div class="flex items-center">
                                <input id="payment" type="checkbox" class="form-checkbox h-4 w-4 text-blue-600 rounded">
                                <label for="payment" class="text-gray-700 ml-3 text-sm">Payment</label>
                            </div>

                            <div class="flex items-center">
                                <input id="update_payment" type="checkbox" class="form-checkbox h-4 w-4 text-blue-600 rounded">
                                <label for="update_payment" class="text-gray-700 ml-3 text-sm">Update Payment</label>
                            </div>

                            <div class="flex items-center">
                                <input id="category" type="checkbox" class="form-checkbox h-4 w-4 text-blue-600 rounded">
                                <label for="category" class="text-gray-700 ml-3 text-sm">Category</label>
                            </div>

                            <div class="flex items-center">
                                <input id="update_category" type="checkbox" class="form-checkbox h-4 w-4 text-blue-600 rounded">
                                <label for="update_category" class="text-gray-700 ml-3 text-sm">Update Category</label>
                            </div>

                            <div class="flex items-center">
                                <input id="reports" type="checkbox" class="form-checkbox h-4 w-4 text-blue-600 rounded">
                                <label for="reports" class="text-gray-700 ml-3 text-sm">Reports</label>
                            </div>

                            <div class="flex items-center">
                                <input id="allowed_roles" type="checkbox" class="form-checkbox h-4 w-4 text-blue-600 rounded">
                                <label for="allowed_roles" class="text-gray-700 ml-3 text-sm">Allowed Roles</label>
                            </div>
                        </div>

                        <div class="text-center pt-3 border-t">
                            <button id="btn_save_branch" type="button" class="btn btn-primary w-100">Add Role</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        
        <div class="col-lg-8">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Role List</h5>
                    <div class="table-responsive">
                        <table id="table_sales" class="table table-bordered table-hover w-100" style="font-size: 13px;">
                            <thead class="bg-light">
                                <tr>
                                    <th class="text-center">Trans ID</th>
                                    <th class="text-center">Role</th>
                                    <th class="text-center">Allowed Role</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<script src="/static/accounting/roles.js"></script>

{% endblock %}
