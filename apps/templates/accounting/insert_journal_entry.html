{% extends 'dashboard.html' %}

{% block content %}

    <div class="pagetitle">
        <h1>Insert Journal Entry</h1> 
    </div><!-- End Page Title -->

    <section class="section">
        <div class="row">
            <div class="col-lg-10 mx-auto">
                <div class="card">
                    <div class="card-body">
                        <form method="POST">
                            <div class="container mt-3">
                                {% for messege in messeges %}
                                <div class="alert alert-danger" role="alert">
                                {{ messege }}
                                </div>
                                {% endfor %}
                            </div>

                            <div class="form-group mb-3">
                                <label for="branch_name" class="form-label-small">Branches</label>
                                <input
                                    type="text"
                                    name="branch_name"
                                    id="branch_name"
                                    class="form-control form-control-sm"
                                /> 
                            </div>
                            
                            <input
                                type="text"
                                name="branch_id"
                                id="branch_id"
                                hidden                            
                            /> 

                            <div class="form-group mb-3">
                                <label for="trans_date" class="form-label-small">Date</label>
                                <input type="date" name="trans_date" 
                                    id="trans_date"
                                    class="form-control form-control-sm"
                                />
                            </div>

                            <div class="form-group mb-3">
                                <label for="journal_type" class="form-label-small">Journal</label>
                                <select name="journal_type" id="journal_type" class="form-select form-select-sm" required>
                                    <option value="General Ledger">General Ledger</option>
                                    <option value="Journal Voucher">Journal Voucher</option>
                                    <option value="Payment">Payments</option>
                                    <option value="Receipts">Receipts</option>
                                    <option value="Sales">Sales</option>
                                    <option value="Purchases">Purchases</option>
                                </select>  
                            </div>
                            
                            <div class="form-group mb-3">
                                <label for="reference" class="form-label-small">Reference</label>
                                <input type="text" name="reference" 
                                    id="reference"  class="form-control form-control-sm"
                                />
                            </div>

                            <div class="form-group mb-3">
                                <label for="description" class="form-label-small">Journal Memo</label>
                                <textarea name="description" id="description" class="form-control form-control-sm" required></textarea>
                            </div>

                            <div class="table-responsive mt-4">
                                <table class="table table-borderless table-sm">
                                    <thead class="border-bottom font-weight-bold">
                                        <tr>
                                            <td>Account Code</td>
                                            <td>AccounTitle</td>
                                            <td>Debit</td>
                                            <td>Credit</td>
                                            <td>Action</td>
                                        </tr>
                                    </thead>
                                    <tbody id="addrow"></tbody>
                                </table>
                            </div>

                            <div class="text-center pt-3 border-t">
                                <button type="button"  id="add_button" class="btn btn-primary btn-sm"><i class="fas fa-plus me-1"></i>Add line</button>
                                <button type="submit" name='submit' id='submiBTN' class="btn btn-success btn-sm" disabled><i class="fas fa-save me-1"></i>Save</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
    
    <script src="/static/accounting/insert_journal_entry2.js"></script>

{% endblock %}
