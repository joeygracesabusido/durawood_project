{% extends 'dashboard.html' %} 
{% block content %}
<!-- jQuery (Make sure it's loaded before jQuery UI) -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- jQuery UI CSS (for styling the autocomplete dropdown) -->
<link rel="stylesheet" href="https://code.jquery.com/ui/1.12.1/themes/smoothness/jquery-ui.css">

<!-- jQuery UI JavaScript -->
<script src="https://code.jquery.com/ui/1.12.1/jquery-ui.min.js"></script>

<link href="https://cdn.datatables.net/v/dt/jszip-3.10.1/dt-2.1.4/b-3.1.1/b-html5-3.1.1/datatables.min.css" rel="stylesheet">
<script src="https://cdn.datatables.net/v/dt/jszip-3.10.1/dt-2.1.4/b-3.1.1/b-html5-3.1.1/datatables.min.js"></script>

<div class="pagetitle">
    <h1>Customer & Vendor Profile</h1>
</div>

<section class="section">
    <div class="row">
        <div class="col-lg-4">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Add Customer / Vendor</h5>

                    <form id="myForm">
                        <div class="form-group mb-3">
                            <label for="customer_vendor_id" class="form-label-small">Customer/Vendor ID</label>
                            <input id="customer_vendor_id" type="text" class="form-control form-control-sm" placeholder="e.g. CUST-001">
                        </div>

                        <div class="form-group mb-3">
                            <label for="bussiness_name" class="form-label-small">Business Name</label>
                            <input id="bussiness_name" type="text" class="form-control form-control-sm" placeholder="Full legal name">
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label for="contact_no" class="form-label-small">Contact No</label>
                                    <input id="contact_no" type="text" class="form-control form-control-sm" placeholder="Phone/Mobile">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label for="contact_person" class="form-label-small">Contact Person</label>
                                    <input id="contact_person" type="text" class="form-control form-control-sm" placeholder="Name">
                                </div>
                            </div>
                        </div>

                        <div class="form-group mb-3">
                            <label for="address" class="form-label-small">Business Address</label>
                            <textarea id="address" class="form-control form-control-sm" style="height: 80px" placeholder="Street, City, Zip"></textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label for="category" class="form-label-small">Category</label>
                                    <input id="category" type="text" class="form-control form-control-sm" placeholder="e.g. Retail">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label for="tax_type" class="form-label-small">Tax Type</label>
                                    <select id="tax_type" class="form-select form-select-sm">
                                        <option value="Vatable ">Vatable</option>
                                        <option value="Non-Vatable ">Non-Vatable</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="form-group mb-4">
                            <label for="description" class="form-label-small">Account Type</label>
                            <select id="description" class="form-select form-select-sm">
                                <option value="Customer">Customer</option>
                                <option value="Vendor">Vendor</option>
                            </select>
                        </div>

                        <div class="text-center pt-3 border-t">
                            <button id="btn_save_branch" type="button" class="btn btn-primary w-100">Add Profile</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="card">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 class="card-title mb-0">Customer/Vendor List</h5>
                        <div class="col-md-4">
                            <div class="input-group input-group-sm">
                                <span class="input-group-text bg-white border-end-0"><i class="bi bi-search"></i></span>
                                <input id="search" type="text" class="form-control border-start-0" placeholder="Search profiles...">
                            </div>
                        </div>
                    </div>

                    <div class="table-responsive">
                        <table id="table_customer" class="table table-bordered table-hover w-100" style="font-size: 13px; text-align: center;">
                            <thead class="bg-light">
                                <tr>
                                    <th>Customer ID</th>
                                    <th>Business Name</th>
                                    <th>Category</th>
                                    <th>Tax Type</th>
                                    <th>Description</th>
                                </tr>
                            </thead>
                            <tbody id="table_customer_list"></tbody>
                        </table>
                    </div>
                    <div id="pagination" class="mt-3"></div>
                </div>
            </div>
        </div>
    </div>
</section>

<script src="/static/accounting/customer.js"></script>

{% endblock %}
