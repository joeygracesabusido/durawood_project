
{% extends 'dashboard.html' %}

{% block content %}

  <div class="pagetitle">
    <h1>IMPORT BEG BALANCE</h1>
  </div><!-- End Page Title -->


        <!-- File Upload Modal -->
        <div class="modal fade" id="import_chart_of_account_modal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Import Beg. Balance</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="upload_chart_of_account_form">
                            <div class="form-group mb-3">
                                <label for="file_upload" class="form-label-small">Choose a File:</label>
                                <input type="file" id="file_upload" accept=".csv,.xlsx" class="form-control form-control-sm">
                            </div>
                            <div id="parsed_data" class="mt-3"></div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Close</button>
                        <button type="button" class="btn btn-primary btn-sm" id="btn_upload_file">Upload</button>
                    </div>
                </div>
            </div>
        </div>

        
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="card-title mb-0">Beginning Balance List</h5>
                <button type="button" class="btn btn-primary btn-sm" 
                    data-bs-toggle="modal" data-bs-target="#import_chart_of_account_modal">
                    Insert Beggining Bal
                </button>
            </div>
            <div class="card-body">
                <div id="table_container" class="mt-3">
                    <!-- Table or content here -->
                </div>
            </div>
        </div>
    
    <script src="/static/accounting/beg_bal.js"></script>
    
{% endblock %}
