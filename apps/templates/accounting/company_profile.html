{% extends 'dashboard.html' %} 
{% block content %}

<div class="pagetitle">
    <h1>Company Profile</h1>
</div>

<section class="section">
    <div class="row">
        <div class="col-lg-8 mx-auto">
            <div class="card">
                <div class="card-body p-4">
                    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-2">
                        <h5 class="card-title mb-0">About Company</h5>
                        <button type="button" id="updateButton" class="btn btn-primary btn-sm">Update</button>
                    </div>

                    <form id="myForm">
                        <input id="id" type="text" value="{{ profiles[0].id }}" readonly hidden />

                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label for="company_name" class="form-label-small">Company Name</label>
                                    <input id="company_name" type="text" class="form-control form-control-sm" value="{{ profiles[0].company_name }}" readonly>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label for="tin" class="form-label-small">TIN</label>
                                    <input id="tin" type="text" class="form-control form-control-sm" value="{{ profiles[0].tin}}" readonly>
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-4">
                                <div class="form-group mb-3">
                                    <label for="company_business_type" class="form-label-small">Business Type</label>
                                    <input id="company_business_type" type="text" class="form-control form-control-sm" value="{{ profiles[0].type_of_bussiness }}" readonly>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-group mb-3">
                                    <label for="company_financial_year_end" class="form-label-small">Financial Year End</label>
                                    <input id="company_financial_year_end" type="text" class="form-control form-control-sm" value="{{ profiles[0].financial_year_end }}" readonly>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-group mb-3">
                                    <label for="company_rdo" class="form-label-small">RDO</label>
                                    <input id="company_rdo" type="text" class="form-control form-control-sm" value="{{ profiles[0].rdo }}" readonly>
                                </div>
                            </div>
                        </div>

                        <div class="form-group mb-3">
                            <label for="company_address" class="form-label-small">Business Address</label>
                            <textarea id="company_address" class="form-control form-control-sm" style="height: 100px" readonly>{{ profiles[0].address }}</textarea>
                        </div>
                    </form>

                    <script>
                        let isEditting = false;
                        const profile_id_input = document.getElementById("id");
                        const company_name = document.getElementById("company_name");
                        const tin = document.getElementById("tin");
                        const company_business_type = document.getElementById("company_business_type");
                        const company_financial_year_end = document.getElementById("company_financial_year_end");
                        const company_rdo = document.getElementById("company_rdo");
                        const company_address = document.getElementById("company_address");
                        const updateButton = document.getElementById("updateButton");
                        const fields = document.querySelectorAll("#myForm input[type='text'], #myForm textarea");

                        updateButton.addEventListener("click", () => {
                            fields.forEach((field) => {
                                field.readOnly = !field.readOnly;
                            });

                            if (fields[0].readOnly) {
                                updateButton.textContent = "Update";
                                updateButton.classList.remove("btn-success");
                                updateButton.classList.add("btn-primary");
                            } else {
                                updateButton.textContent = "Save Changes";
                                updateButton.classList.remove("btn-primary");
                                updateButton.classList.add("btn-success");
                            }

                            if (updateButton.textContent === "Update") {
                                if (isEditting) {
                                    updateCompanyProfile();
                                    isEditting = false;
                                }
                            } else {
                                isEditting = true;
                            }
                        });

                        async function updateCompanyProfile() {
                            const profileData = {
                                tin: tin.value,
                                company_name: company_name.value,
                                address: company_address.value,
                                rdo: company_rdo.value,
                                type_of_bussiness: company_business_type.value,
                                financial_year_end: company_financial_year_end.value,
                                user: "current_user"
                            };

                            const profile_id = parseInt(profile_id_input.value);
                            if (isNaN(profile_id)) {
                                alert("Invalid Profile ID");
                                return;
                            }

                            try {
                                const response = await fetch(`/api-update-company_profile/?profile_id=${profile_id}`, {
                                    method: "PUT",
                                    headers: { "Content-Type": "application/json" },
                                    body: JSON.stringify(profileData),
                                });

                                if (response.ok) {
                                    const result = await response.json();
                                    alert(result.message);
                                } else {
                                    const error = await response.json();
                                    alert(`Error: ${error.detail}`);
                                }
                            } catch (error) {
                                console.error("An error occurred:", error);
                                alert("An error occurred while updating the profile.");
                            }
                        }
                    </script>
                </div>
            </div>
        </div>
    </div>
</section>

{% endblock %}
