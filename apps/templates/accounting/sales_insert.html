{% extends 'dashboard.html' %}
{% block content %}

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- jQuery (Make sure it's loaded before jQuery UI) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- jQuery UI CSS (for styling the autocomplete dropdown) -->
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.12.1/themes/smoothness/jquery-ui.css">

    <!-- jQuery UI JavaScript -->
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.min.js"></script>

    <link href="https://cdn.datatables.net/v/dt/jszip-3.10.1/dt-2.1.4/b-3.1.1/b-html5-3.1.1/datatables.min.css" rel="stylesheet">
    <script src="https://cdn.datatables.net/v/dt/jszip-3.10.1/dt-2.1.4/b-3.1.1/b-html5-3.1.1/datatables.min.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <link rel="stylesheet" href="/static/accounting/quickbooks_expense_form.css">
    
    <style>
        .customer-balance-display {
            font-size: 14px;
            color: #6b7280;
            margin-top: 5px;
            font-weight: 500;
        }
        
        #summary-balance {
            color: #10b981;
            font-weight: 700;
        }

        /* Override for autocomplete to work with new style */
        .ui-autocomplete {
            z-index: 1050 !important;
        }
        
        .form-header {
            background-color: #f8f9fa;
            padding: 25px;
            border-radius: 8px 8px 0 0;
            margin: -30px -30px 30px -30px;
        }
    </style>
</head>

<div class="pagetitle">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="page-header-title">Sales Transaction</h1>
        <div>
            <a href="/sales/" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-list-ul"></i> Sales List
            </a>
        </div>
    </div>
</div>

<section class="section">
    <div class="expense-form-container">
        <form id="myForm">
            <!-- Header Section -->
            <div class="form-header">
                <div class="header-left">
                    <div class="form-group">
                        <label class="form-label-small">Customer</label>
                        <div class="position-relative">
                            <input id="customer" type="text" class="form-control form-control-sm" placeholder="Search or type customer..." required>
                        </div>
                        <div class="customer-balance-display">
                            Balance: <span id="summary-balance">₱0.00</span>
                        </div>
                    </div>

                    <div class="header-left-inner d-flex gap-3 flex-grow-1">
                      <div class="form-group">
                          <label class="form-label-small">Customer ID</label>
                          <input id="customer_id" type="text" class="form-control form-control-sm" readonly>
                      </div>

                      <div class="form-group">
                          <label class="form-label-small">Category</label>
                          <input id="category" type="text" class="form-control form-control-sm" placeholder="Search or type category...">
                      </div>
                    </div>
                </div>

                <div class="header-right">
                    <div class="amount-display">
                        <div class="amount-label">TOTAL AMOUNT</div>
                        <div class="amount-value">₱<span id="display_amount">0.00</span></div>
                    </div>
                </div>
            </div>

            <!-- Transaction Details Section -->
            <div class="section-title mt-4">Transaction Details</div>
            
            <div class="form-group-row">
                <div class="form-group">
                    <label class="form-label-small">Delivery Date</label>
                    <input id="delivery_date" type="date" class="form-control form-control-sm">
                </div>
                <div class="form-group">
                    <label class="form-label-small">Invoice Date</label>
                    <input id="invoice_date" type="date" class="form-control form-control-sm">
                </div>
                <div class="form-group">
                    <label class="form-label-small">Invoice No.</label>
                    <input id="invoice_no" type="text" class="form-control form-control-sm">
                </div>
                <div class="form-group">
                    <label class="form-label-small">PO No.</label>
                    <input id="po_no" type="text" class="form-control form-control-sm">
                </div>
            </div>

            <div class="form-group-row">
                <div class="form-group">
                    <label class="form-label-small">Load No.</label>
                    <input id="load_no" type="text" class="form-control form-control-sm">
                </div>
                <div class="form-group">
                    <label class="form-label-small">DR No.</label>
                    <input id="dr_no" type="text" class="form-control form-control-sm">
                </div>
                <div class="form-group">
                    <label class="form-label-small">Items</label>
                    <select id="items" class="form-select form-select-sm">
                        <option value="CEMENT">CEMENT</option>
                        <option value="OTHER MATERIALS">OTHER MATERIALS</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label-small">Terms</label>
                    <select id="terms" class="form-select form-select-sm">
                        <option value="COD">COD</option>
                        <option value="15 days">15 days</option>
                        <option value="20 days">20 days</option>
                        <option value="30 days">30 days</option>
                        <option value="60 days">60 days</option>
                        <option value="90 days">90 days</option>
                        <option value="120 days">120 days</option>
                        <option value="180 days">180 days</option>
                    </select>
                </div>
            </div>

            <div class="form-group-row">
                <div class="form-group">
                    <label class="form-label-small">Due Date</label>
                    <input id="due_date" type="date" class="form-control form-control-sm">
                </div>
                <div class="form-group">
                    <label class="form-label-small">Tax Type</label>
                    <select id="tax_type" class="form-select form-select-sm">
                        <option value="Vatable">Vatable</option>
                        <option value="Non-Vatable">Non-Vatable</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label-small">Amount</label>
                    <input id="amount" type="number" step="0.01" class="form-control form-control-sm text-end" placeholder="0.00">
                </div>
            </div>

            <hr>

            <div class="row">
                <div class="col-md-6 offset-md-6">
                    <div class="totals-section">
                        <div class="totals-row">
                            <span class="totals-label">Net of Vat</span>
                            <input type="text" id="net_of_vat" class="form-control form-control-sm text-end border-0 bg-transparent fw-bold" readonly value="0.00">
                        </div>
                        <div class="totals-row">
                            <span class="totals-label">VAT (12%)</span>
                            <input type="text" id="vat" class="form-control form-control-sm text-end border-0 bg-transparent fw-bold" readonly value="0.00">
                        </div>
                        <div class="totals-row">
                            <span class="totals-label">Total Amount</span>
                            <span class="totals-value total">₱<span id="final_total">0.00</span></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Buttons Section -->
            <div class="form-buttons">
                <button type="reset" class="btn btn-outline-secondary">
                    <i class="bi bi-x-circle"></i> Clear
                </button>
                <button id="btn_save_branch" type="button" class="btn btn-primary">
                    <i class="bi bi-check-circle"></i> Save Sales Transaction
                </button>
            </div>
        </form>
    </div>
</section>

<script src="/static/accounting/sales_insert.js"></script>

{% endblock %}
